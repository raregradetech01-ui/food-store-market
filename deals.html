<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deals - Limited Offers</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-900 via-slate-900 to-zinc-950 text-white font-sans antialiased pb-12">

  <div class="fixed top-6 left-1/2 -translate-x-1/2 z-50 w-auto">
    <nav class="flex items-center gap-2 p-1.5 rounded-full bg-black/40 backdrop-blur-md border border-white/10 shadow-2xl">
      <a href="shop.html" class="px-5 py-2 text-sm font-medium rounded-full text-gray-400 hover:text-white transition-all duration-200">
        Shop
      </a>
      <a href="deals.html" class="px-5 py-2 text-sm font-medium rounded-full bg-rose-500 text-white shadow-lg shadow-rose-500/20 transition-all duration-200">
        Deals
      </a>
    </nav>
  </div>

  <main class="max-w-4xl mx-auto px-6 pt-32">
    
    <header class="mb-12 text-center">
      <span class="inline-block px-4 py-1.5 text-xs font-semibold tracking-widest uppercase bg-rose-500/10 border border-rose-500/30 rounded-full backdrop-blur-md text-rose-400">
        Limited Time Offers
      </span>
      <h1 class="text-4xl md:text-5xl font-bold mt-4 tracking-tight">
        Exclusive Deals
      </h1>
      <p class="text-gray-400 mt-2">
        Premium products at highly competitive rates. Once they are gone, they are gone.
      </p>
    </header>

    <div class="space-y-6">
      
      <div class="relative overflow-hidden flex flex-col md:flex-row items-start md:items-center justify-between p-6 md:p-8 rounded-2xl bg-gradient-to-r from-white/5 to-white/[0.02] backdrop-blur-xl border border-white/10 shadow-2xl">
        <div class="absolute top-0 right-0 w-32 h-32 bg-rose-500/10 rounded-full blur-3xl pointer-events-none"></div>
        
        <div class="space-y-3">
          <div class="flex flex-wrap items-center gap-2">
            <span class="px-3 py-1 text-xs font-bold rounded-full bg-rose-500 text-white shadow-lg shadow-rose-500/20">
              40% OFF
            </span>
            <span class="px-3 py-1 text-xs font-medium rounded-full bg-white/5 border border-white/10 text-gray-400 flex items-center gap-1">
              ⏱️ 2h 40m
            </span>
          </div>
          <h3 class="text-xl md:text-2xl font-semibold tracking-tight text-white">
            Flash Sale: Pro Audio Bundle
          </h3>
        </div>

        <div class="flex items-center gap-6 mt-6 md:mt-0 w-full md:w-auto justify-between md:justify-end pt-4 md:pt-0 border-t md:border-t-0 border-white/5">
          <div class="text-right flex flex-col">
            <span class="text-sm line-through text-gray-500">$250</span>
            <span class="text-2xl font-extrabold text-rose-400">$149</span>
          </div>
          <button class="px-6 py-3 font-semibold text-sm bg-gradient-to-r from-rose-500 to-pink-500 hover:from-rose-400 hover:to-pink-400 text-white rounded-full transition-all duration-200 active:scale-95 shadow-lg shadow-rose-500/20">
            Claim Deal
          </button>
        </div>
      </div>

      <div class="relative overflow-hidden flex flex-col md:flex-row items-start md:items-center justify-between p-6 md:p-8 rounded-2xl bg-gradient-to-r from-white/5 to-white/[0.02] backdrop-blur-xl border border-white/10 shadow-2xl">
        <div class="absolute top-0 right-0 w-32 h-32 bg-rose-500/10 rounded-full blur-3xl pointer-events-none"></div>
        
        <div class="space-y-3">
          <div class="flex flex-wrap items-center gap-2">
            <span class="px-3 py-1 text-xs font-bold rounded-full bg-rose-500 text-white shadow-lg shadow-rose-500/20">
              45% OFF
            </span>
            <span class="px-3 py-1 text-xs font-medium rounded-full bg-white/5 border border-white/10 text-gray-400 flex items-center gap-1">
              ⏱️ 5h 12m
            </span>
          </div>
          <h3 class="text-xl md:text-2xl font-semibold tracking-tight text-white">
            Desk Setup Essential Pack
          </h3>
        </div>

        <div class="flex items-center gap-6 mt-6 md:mt-0 w-full md:w-auto justify-between md:justify-end pt-4 md:pt-0 border-t md:border-t-0 border-white/5">
          <div class="text-right flex flex-col">
            <span class="text-sm line-through text-gray-500">$180</span>
            <span class="text-2xl font-extrabold text-rose-400">$99</span>
          </div>
          <button class="px-6 py-3 font-semibold text-sm bg-gradient-to-r from-rose-500 to-pink-500 hover:from-rose-400 hover:to-pink-400 text-white rounded-full transition-all duration-200 active:scale-95 shadow-lg shadow-rose-500/20">
            Claim Deal
          </button>
        </div>
      </div>

    </div>
  </main>

</body>
</html>
